AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Unified Invoice health-only serverless API scaffold

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod

Globals:
  Function:
    Runtime: nodejs22.x
    Architectures:
      - x86_64
    MemorySize: 128
    Timeout: 5
    Tags:
      Project: UnifiedInvoice
      Environment: !Ref EnvironmentName
      ManagedBy: SAM

Resources:
  HealthApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref EnvironmentName
      Tags:
        Project: UnifiedInvoice
        Environment: !Ref EnvironmentName
        ManagedBy: SAM

  HealthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub unified-invoice-${EnvironmentName}-health
      Description: Returns the Unified Invoice API scaffold health status
      CodeUri: ../../apps/api/dist/
      Handler: index.healthHandler
      Events:
        Health:
          Type: HttpApi
          Properties:
            ApiId: !Ref HealthApi
            Path: /health
            Method: GET

  HealthFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      LogGroupName: !Sub /aws/lambda/unified-invoice-${EnvironmentName}-health
      RetentionInDays: 14
      Tags:
        - Key: Project
          Value: UnifiedInvoice
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: SAM

Outputs:
  HealthApiUrl:
    Description: Environment health endpoint
    Value: !Sub https://${HealthApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/${EnvironmentName}/health
  HealthFunctionName:
    Description: Health Lambda function name
    Value: !Ref HealthFunction
